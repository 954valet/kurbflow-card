<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Micah Woodson — Coast 2 Coast Cabinets & Refinishing</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f5f0eb;
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .card-container {
    width: 100%; max-width: 420px; padding: 20px;
  }
  .card {
    background: #ffffff;
    border-radius: 18px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
    overflow: hidden;
  }
  .card-image {
    width: 100%;
    display: block;
    border-radius: 18px 18px 0 0;
  }
  .card-body {
    padding: 24px 28px 28px;
    text-align: center;
  }
  .person-name {
    font-size: 22px;
    font-weight: 600;
    color: #2c2c2c;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .person-title {
    font-size: 13px;
    color: #888;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 400;
    margin-bottom: 20px;
  }
  .contact-links {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 24px;
  }
  .contact-link {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 12px 16px;
    border-radius: 10px;
    background: #f8f5f2;
    text-decoration: none;
    color: #3a3a3a;
    font-size: 15px;
    transition: all 0.2s;
  }
  .contact-link:hover {
    background: #f0ebe5;
    transform: translateY(-1px);
  }
  .contact-link svg {
    width: 18px; height: 18px; flex-shrink: 0; color: #c4956a;
  }
  .actions {
    display: flex;
    gap: 10px;
  }
  .btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 16px;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn svg { width: 18px; height: 18px; }
  .btn-save {
    background: linear-gradient(135deg, #3a3a3a, #2c2c2c);
    color: #fff;
  }
  .btn-save:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(58,58,58,0.3); }
  .btn-share {
    background: linear-gradient(135deg, #c4956a, #a8774f);
    color: #fff;
  }
  .btn-share:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(196,149,106,0.3); }

  .qr-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(6px);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .qr-overlay.active { display: flex; }
  .qr-modal {
    background: #fff;
    border-radius: 20px;
    padding: 32px;
    text-align: center;
    max-width: 320px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .qr-modal h3 { font-size: 16px; color: #3a3a3a; margin-bottom: 4px; }
  .qr-modal p { font-size: 12px; color: #999; margin-bottom: 20px; }
  #qrcode { display: flex; justify-content: center; margin-bottom: 20px; }
  .qr-close {
    background: #f0ebe5; border: none;
    padding: 10px 28px; border-radius: 8px;
    font-size: 14px; color: #3a3a3a; cursor: pointer;
  }
</style>
</head>

function shareCard() {

      text: 'Check out my digital business card',
      url: url
    }).catch(function(){});
  } else {
    var overlay = document.getElementById('qrOverlay');
    overlay.classList.add('active');
    var qrEl = document.getElementById('qrcode');
    qrEl.innerHTML = '';
    new QRCode(qrEl, {
      text: url,
      width: 200,
      height: 200,
      colorDark: '#3a3a3a',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });

}

function closeQR() {
