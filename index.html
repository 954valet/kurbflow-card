<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mark Murphy | KurbFlow - Valet Trash Service</title>
  <meta name="description" content="Mark Murphy, Owner/Operator of KurbFlow valet trash service. Serving Broward County, Florida. Reliable, Clean, Professional.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --orange: #E8751A;
      --green: #3DAA35;
      --dark: #2A2A2A;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 50%, #1a1a1a 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #fff;
    }

    .card-scene {
      perspective: 1200px;
      width: 100%;
      max-width: 520px;
    }

    .card-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 915 / 540;
      cursor: pointer;
      transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
    }

    .card-wrapper.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
    }

    .card-face img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-back {
      transform: rotateY(180deg);
    }

    .flip-hint {
      margin-top: 20px;
      font-size: 0.8rem;
      color: #9E9E9E;
      animation: pulse 2s ease-in-out infinite;
      user-select: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 28px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
      max-width: 520px;
    }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      border: none;
      border-radius: 50px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: 0.5px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.25s;
      color: #fff;
    }

    .action-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }

    .action-btn:active { transform: translateY(0); }
    .btn-call { background: linear-gradient(135deg, #3DAA35, #2d8e26); }
    .btn-email { background: linear-gradient(135deg, #E8751A, #c7600e); }
    .btn-website { background: linear-gradient(135deg, #555, #333); }
    .btn-save { background: linear-gradient(135deg, #2196F3, #1565C0); }

    .action-btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
      flex-shrink: 0;
    }

    @media (max-width: 520px) {
      .card-scene { max-width: 100%; }
      .actions { gap: 8px; }
      .action-btn { padding: 10px 16px; font-size: 0.75rem; }
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #3DAA35;
      color: white;
      padding: 14px 28px;
      border-radius: 50px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 100;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
